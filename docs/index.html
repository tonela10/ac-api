<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Animal Crossing API — Reference</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🍃%3C/text%3E%3C/svg%3E">
  <style>
    body { margin: 0; background: #fafafa; }
    .topbar {
      background: #4a7c59;
      color: #fff;
      padding: 12px 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar h1 { margin: 0; font-size: 18px; font-weight: 600; }
    .topbar a { color: #d9ead3; text-decoration: none; font-size: 14px; margin-left: 16px; }
    .topbar a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>Animal Crossing API</h1>
    <nav>
      <a href="https://github.com/tonela10/ac-api">GitHub</a>
      <a href="openapi.yaml">OpenAPI spec</a>
    </nav>
  </header>
  <div id="swagger-ui"></div>

  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui-bundle.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js" crossorigin></script>
  <script>
    window.addEventListener('load', () => {
      window.ui = SwaggerUIBundle({
        url: 'openapi.yaml',
        dom_id: '#swagger-ui',
        deepLinking: true,
        docExpansion: 'list',
        defaultModelsExpandDepth: 1,
        tagsSorter: 'alpha',
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset.slice(1),
        ],
        layout: 'BaseLayout',
      });
    });
  </script>
</body>
</html>
